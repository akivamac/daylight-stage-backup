# ===== Behavior =====
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
# Touch-friendly scrolling — don't snap back to bottom
set -g @scroll-without-changing-page "on"
bind -T copy-mode-vi WheelUpPane send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
# Ctrl+C copies selection, stays in copy mode (no scroll-snap)
bind -T copy-mode-vi C-c send-keys -X copy-pipe-no-clear "termux-clipboard-set 2>/dev/null || cat > /dev/null"
# Also support standard vi yank
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "termux-clipboard-set 2>/dev/null || cat > /dev/null"
# Esc exits copy mode (instead of Ctrl+C which we just stole)
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# ===== Top tab bar, Mac Terminal vibes =====
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left ""
set -g status-right "#[fg=colour245] %a %b %d  #[fg=colour250]%H:%M "
set -g status-right-length 50
set -g status-style "bg=colour234,fg=colour250"

# Inactive tab
setw -g window-status-format "#[bg=colour238,fg=colour252]      #I  #W      #[bg=colour234,nobold]"
setw -g window-status-current-format "#[bg=colour39,fg=colour16,bold]      #I  #W      #[bg=colour234,nobold]"
setw -g window-status-separator " "

# Activity blink in other tabs
setw -g window-status-activity-style "fg=colour220,bg=colour234,bold"
setw -g monitor-activity on
set -g visual-activity off

# Pane borders + messages
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour39"
set -g message-style "bg=colour39,fg=colour16,bold"

# ===== Mac-Terminal-style keys (Alt = Cmd) =====
bind -n M-t new-window
bind -n M-w confirm-before -p "Close tab? (y/n) " kill-window
bind -n M-Right next-window
bind -n M-Left  previous-window
bind -n M-S-Right swap-window -t +1 \; next-window
bind -n M-S-Left  swap-window -t -1 \; previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-r command-prompt -p "Tab name:" "rename-window '%%'"

# Reload config without restarting
bind r source-file ~/.tmux.conf \; display "Config reloaded"
